name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'Dockerfile'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - '.github/workflows/docker.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium /usr/local/share/edge
          sudo apt-get clean
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build into the local daemon first so the image can be smoke-tested
      # before anything is pushed. A plain build only proves the layers
      # assemble; running the binary proves the dynamic linker can resolve
      # every shared library, which is exactly what was missing in issue #59
      # (libz.so.1). Nothing validated the published image before this.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: open-ontologies:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (binary starts, all shared libs resolve)
        run: docker run --rm open-ontologies:ci --help

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: startsWith(github.ref, 'refs/tags/v')
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Push image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
