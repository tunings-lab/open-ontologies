name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: open-ontologies
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: open-ontologies
          - os: macos-14
            target: x86_64-apple-darwin
            artifact_name: open-ontologies
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: open-ontologies.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux build deps (OpenSSL/libpq)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libpq-dev
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: open-ontologies-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Rename binaries
        run: |
          for dir in open-ontologies-*/; do
            target="${dir%/}"
            target="${target#open-ontologies-}"
            if [ -f "${dir}open-ontologies.exe" ]; then
              mv "${dir}open-ontologies.exe" "${dir}open-ontologies-${target}.exe"
            else
              mv "${dir}open-ontologies" "${dir}open-ontologies-${target}"
            fi
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: open-ontologies-*/open-ontologies-*
